events {}

http {
  # "upstream" defines a named pool of backend servers Nginx can route
  # to. The names here (backend1, backend2, backend3) are the same
  # Docker Compose service names from docker-compose.yml — Compose's
  # internal DNS resolves them, same as your backend code resolving
  # "redis" or talking to Atlas.
  upstream backend_pool {
    server backend1:4000;
    server backend2:4000;
    server backend3:4000;
  }

  server {
    listen 80;

    location / {
      # Default load-balancing algorithm here is round robin — request 1
      # goes to backend1, request 2 to backend2, request 3 to backend3,
      # request 4 back to backend1, and so on. Simple, and a solid
      # default when your instances are identical and stateless (which
      # yours are, by design, since CP1-CP4 pushed everything into
      # Mongo/Redis).
      proxy_pass http://backend_pool;

      # Without these, every request arrives at your Node app looking
      # like it came from Nginx's own internal IP, not the real client.
      # This directly breaks your CP4 rate limiter, which keys off
      # req.ip — everyone would share one bucket. These headers forward
      # the real client info through.
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}