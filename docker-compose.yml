services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend1:
    build: ./backend
    environment:
      - MONGO_URL=${MONGO_URL}
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    depends_on:
      - redis

  backend2:
    build: ./backend
    environment:
      - MONGO_URL=${MONGO_URL}
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    depends_on:
      - redis

  backend3:
    build: ./backend
    environment:
      - MONGO_URL=${MONGO_URL}
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3